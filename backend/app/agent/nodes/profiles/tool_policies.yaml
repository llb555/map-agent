# read_only: whether this tool may mutate external state.
# concurrency_safe: whether this tool can run safely in parallel with peers.
tool_policies:
  invoke_worker:
    read_only: true
    concurrency_safe: true
  db_query_tool:
    read_only: true
    concurrency_safe: true
  geo_resolve_tool:
    read_only: true
    concurrency_safe: true
  location_resolve_tool:
    read_only: true
    concurrency_safe: true
  route_plan_tool:
    read_only: true
    concurrency_safe: true
  summary_tool:
    read_only: true
    concurrency_safe: true

mcp_defaults:
  allow_all: true
