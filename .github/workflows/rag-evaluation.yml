name: RAG evaluation

on:
  pull_request:
    paths:
      - "backend/app/rag/**"
      - "backend/app/evaluation/**"
      - "backend/evaluation/**"
      - "backend/scripts/evaluate_rag.py"
      - "backend/scripts/validate_rag_dataset.py"
      - "backend/scripts/compare_rag_reports.py"
      - ".github/workflows/rag-evaluation.yml"
  push:
    branches: [main]
    paths:
      - "backend/app/rag/**"
      - "backend/app/evaluation/**"
      - "backend/evaluation/**"
      - "backend/scripts/evaluate_rag.py"
      - "backend/scripts/validate_rag_dataset.py"
      - "backend/scripts/compare_rag_reports.py"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install -e "./backend[dev]"
      - name: Test evaluation engine
        run: python -m pytest backend/app/tests/unit/test_rag_evaluation.py -q
      - name: Validate evaluation contracts
        run: |
          python backend/scripts/validate_rag_dataset.py backend/evaluation/datasets/arcadegent_demo_v2.json
          python backend/scripts/validate_rag_dataset.py backend/evaluation/predictions.example.json --kind predictions
      - name: Run public quality gate
        run: >-
          python backend/scripts/evaluate_rag.py
          --dataset backend/evaluation/datasets/arcadegent_demo_v2.json
          --source-path backend/evaluation/fixtures/knowledge
          --embedding-model local-hash-v1
          --top-k 5
          --cutoffs 1,3,5
          --latency-runs 3
          --warmup-runs 1
          --output-dir artifacts/rag-evaluation
          --fail-on-gate
      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-evaluation-report
          path: artifacts/rag-evaluation
